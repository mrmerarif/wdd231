  <!-- Fonts -->

  <!-- Styles -->

  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/large.css" media="(min-width:48rem)">

  <!-- Scripts -->

  <script src="scripts/dates.js" defer></script>
  <script src="scripts/contact.js" defer></script>

  <link rel="icon" href="favicon.ico">
</head>

<body>
  <header>
    <div class="header-content">
      <h1>5–10 Ingredient Meals</h1>
      <p>Simple, budget-friendly recipes anyone can make</p>
    </div>

    <nav id="main-nav">
      <button id="menu-toggle" aria-label="Toggle navigation menu">☰</button>
      <ul id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="recipes.html">Recipes</a></li>
        <li><a href="contact.html" class="active-link" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact">
      <h2>Contact Us</h2>
      <p>Have a question or want to share your recipe? Fill out the form below and we’ll get back to you soon.</p>

      <form id="contact-form" novalidate>
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message *</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </section>
  </main>

  <footer>
    <p>© <span id="current-year"></span> Merari Flores – Utah, USA</p>
    <p id="last-modified"></p>
    <p><a href="attributions.html">References & Credits</a></p>
    <p><a href="video-demo.html">Project Video Demo</a></p>
  </footer>
